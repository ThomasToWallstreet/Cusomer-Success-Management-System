services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ka_csm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ka_csm"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ka_csm?schema=public
    command: sh -c "chmod +x ./scripts/migrate-deploy.sh && ./scripts/migrate-deploy.sh"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ka_csm?schema=public
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  pgdata:
